<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:'Tahoma','Arial','Segoe UI',sans-serif;
  background:linear-gradient(#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:95%;
  max-width:700px;
  background:#111827;
  padding:25px;
  border-radius:20px;
  text-align:center;
}
.logo{
  width:120px;height:120px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #38bdf8;
  margin-bottom:10px;
}
h1{color:#38bdf8}
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:10px;
}
input{
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:14px;
  width:150px;
  background:#1f2937;
  color:white
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:14px;
  background:#38bdf8;
  cursor:pointer;
  min-width:120px;
}
.result{
  background:#1f2937;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:right;
  line-height:2;
}
.explainBox{
  display:none;
  margin-top:15px;
  text-align:right;
  background:#020617;
  border-radius:10px;
  padding:15px;
  line-height:2;
}
</style>
</head>
<body>

<div class="container">
<img src="https://i.postimg.cc/Y2fTWqzm/Picsart-26-03-30-01-37-06-582.jpg" class="logo">
<h1 id="title">عيد قيامة مجيد</h1>

<div class="controls">
<button onclick="setLang('ar')">عربي</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="controls">
<input type="number" id="year" placeholder="السنة">
</div>

<div class="controls">
<button onclick="calc()" id="calcBtn">احسب</button>
<button onclick="showExplanation()" id="expBtn">شرح الصيامات</button>
</div>

<div id="out" class="result">النتيجة ستظهر هنا</div>
<div id="explain" class="explainBox"></div>

</div>

<script>
// ===== اللغة =====
let lang='ar';
const t={
ar:{title:"عيد قيامة مجيد",calc:"احسب",exp:"شرح الصيامات",res:"النتيجة ستظهر هنا"},
en:{title:"Happy Easter",calc:"Calculate",exp:"Fasting Explanation",res:"Result will appear here"}
};
function setLang(l){
  lang=l;
  document.documentElement.dir=(l==='ar')?'rtl':'ltr';
  title.innerText=t[l].title;
  calcBtn.innerText=t[l].calc;
  expBtn.innerText=t[l].exp;
  out.innerText=t[l].res;
}

// ===== حساب عيد القيامة الأرثوذكسي بدقة =====
function orthodoxEaster(y){
    let a = y % 4;
    let b = y % 7;
    let c = y % 19;
    let d = (19*c + 15) % 30;
    let e = (2*a + 4*b - d + 34) % 7;
    let month = Math.floor((d + e + 114) / 31);
    let day = ((d + e + 114) % 31) + 1;
    let julianDate = new Date(y, month-1, day);
    // تحويل من اليولياني للغريغوري
    let offset = Math.floor(y/100) - Math.floor(y/400) - 2;
    julianDate.setDate(julianDate.getDate() + offset);
    return julianDate;
}

// ===== دوال مساعدة =====
function addDays(date, n){
    let d = new Date(date);
    d.setDate(d.getDate() + n);
    return d;
}

function formatDate(d){
    return d.toLocaleDateString(lang==='ar'?'ar-EG':'en-US', {day:'numeric', month:'long', year:'numeric'});
}

// ===== احسب النواتج =====
function calc(){
  let y = parseInt(year.value);
  if(!y){alert(lang==='ar'?"ادخل السنة":"Enter year"); return;}

  let easter = orthodoxEaster(y);
  let lentStart = addDays(easter, -55);          // بداية الصوم الكبير
  let rafaa = addDays(lentStart, -1);            // يوم الرفاع
  let palm = addDays(easter, -7);                // أحد الشعانين
  let pentecost = addDays(easter, 49);           // عيد العنصرة (50 يوم بعد القيامة)
  let apostlesStart = addDays(pentecost, 1);     // بداية صوم الرسل
  let apostlesEnd = new Date(y, 6, 12);          // نهاية صوم الرسل 12 يوليو
  let jonah = addDays(lentStart, -14);           // صوم يونان

  let text = lang==='ar' ? `
📅 السنة: ${y}
<br>
🔹 صوم يونان: ${formatDate(jonah)}
<br>
🔹 بداية الصوم الكبير: ${formatDate(lentStart)}
<br>
🔹 يوم الرفاع: ${formatDate(rafaa)}
<br>
🔹 أحد الشعانين: ${formatDate(palm)}
<br>
🔹 عيد القيامة المجيد: ${formatDate(easter)}
<br>
🔹 عيد العنصرة: ${formatDate(pentecost)}
<br>
🔹 بداية صوم الرسل: ${formatDate(apostlesStart)}
<br>
🔹 نهاية صوم الرسل: ${formatDate(apostlesEnd)}
` : `
📅 Year: ${y}
<br>
🔹 Jonah Fast: ${formatDate(jonah)}
<br>
🔹 Great Lent Start: ${formatDate(lentStart)}
<br>
🔹 Rafaa Day: ${formatDate(rafaa)}
<br>
🔹 Palm Sunday: ${formatDate(palm)}
<br>
🔹 Easter: ${formatDate(easter)}
<br>
🔹 Pentecost: ${formatDate(pentecost)}
<br>
🔹 Apostles Fast Start: ${formatDate(apostlesStart)}
<br>
🔹 Apostles Fast End: ${formatDate(apostlesEnd)}
`;
  out.innerHTML = text;
}

// ===== شرح الصيامات بدون سنة =====
function showExplanation(){
  let box=document.getElementById("explain");
  if(box.style.display==="block"){box.style.display="none"; return;}
  let text = lang==='ar' ? `
🔹 طريقة حساب الصيام الكبير (يوم الرفاع):
القاعدة: يتم تحديد يوم الرفاع بناءً على عيد القيامة.
الخطوات:
1️⃣ نحدد يوم عيد القيامة (يوم أحد)
2️⃣ نرجع 55 يوم → بداية الصوم الكبير
3️⃣ اليوم السابق مباشرة = يوم الرفاع (الأحد الذي يسبق أسبوع الاستعداد)
مثال: إذا كان عيد القيامة في شهر برمهات:
- نضيف 4 أيام → نحصل على يوم الرفاع
- إذا كان الناتج >30 → نطرح 30 ويصبح التاريخ في أمشير
` : `
🔹 How to calculate Great Lent (Rafaa Day):
Rule: Rafaa is determined from Easter.
Steps:
1️⃣ Determine Easter Sunday
2️⃣ Subtract 55 days → start of Great Lent
3️⃣ Previous day = Rafaa Day (Sunday before preparation week)
Example: if Easter is in Baramhat:
- Add 4 days → Rafaa day
- If >30 → subtract 30 → date in Amshir
`;
  box.innerHTML=text;
  box.style.display="block";
}
</script>
</body>
</html>
